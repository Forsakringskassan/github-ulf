name: Bundle Maven CI

on:
  workflow_call:
    secrets:
      PACKAGES_RW_ACTOR:
        required: true
      PACKAGES_RW_TOKEN:
        required: true

jobs:
  call-bundle-maven-quarkus-ci:
    uses: Forsakringskassan/github-ulf/.github/workflows/bundle-maven-quarkus-ci.yaml@test
    secrets:
      PACKAGES_RW_ACTOR: ${{ secrets.PACKAGES_RW_ACTOR }}
      PACKAGES_RW_TOKEN: ${{ secrets.PACKAGES_RW_TOKEN }}
